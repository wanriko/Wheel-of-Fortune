<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Fortune (Zingiber montanum)</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:#f4f1f8;
        }
        h1{
            margin:20px;
            font-weight:700;
            color:#7b2cbf;
        }
        h1 small{
            font-size:33%;
            font-weight:400;
            color:#777;
        }
        .main{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:30px;
            padding:20px;
        }
        .wheel-container{
            position:relative;
            background:white;
            padding:25px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
        }
        .pointer{
            width:0;
            height:0;
            border-left:18px solid transparent;
            border-right:18px solid transparent;
            border-top:30px solid #e63946;
            position:absolute;
            top:-5px;
            left:50%;
            transform:translateX(-50%);
        }
        canvas{
            display:block;
            transition:transform 3s cubic-bezier(.17,.67,.83,.67);
        }
        .card{
            background:white;
            padding:18px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
            width:90%;
            max-width:360px;
        }
        textarea{
            width:90%;
            height:100px;
            border-radius:12px;
            padding:10px;
            border:1px solid #ddd;
        }
        button{
            padding:10px 15px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            margin-top:8px;
        }
        .primary{
            background:linear-gradient(90deg,#7b2cbf,#c77dff);
            color:white;
        }
        .secondary{
            background:#e0e0e0;
        }
        
        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            font-size: 14px;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-label.active {
            color: #222;
            font-weight: 600;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: #ccc;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.25s;
            padding: 0;
            flex-shrink: 0;
        }

        .toggle-switch[aria-checked="true"] {
            background: #4f46e5;
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
            pointer-events: none;
        }

        .toggle-switch[aria-checked="true"] .toggle-thumb {
            transform: translateX(20px);
        }
        input[type="number"]{
            width:30%;
            padding:8px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        /* ── Results scrollable box ── */
        #results{
            display: none;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0d7f5;
            border-radius: 12px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 14px;
            background: #faf8ff;
            line-height: 1.7;
        }
        #results::-webkit-scrollbar{
            width: 6px;
        }
        #results::-webkit-scrollbar-track{
            background: transparent;
        }
        #results::-webkit-scrollbar-thumb{
            background: #c77dff;
            border-radius: 99px;
        }

        .summary{
            margin-top:10px;
            font-size:13px;
        }
        #clearResultsBtn {
            display: none;
        }
        @media(max-width:900px){
            .main{flex-direction:column;align-items:center;}
        }
    </style>
</head>

<body>
    <h1>Wheel of Fortune <small>(Zingiber montanum)</small></h1>

    <div class="main">

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="520" height="520"></canvas>
        </div>

        <div class="card">

            <h3>Manage Items</h3>
                <textarea id="itemsInput">Option 1
Option 2
Option 3
Option 4</textarea>

                <button class="secondary" onclick="updateItems()">Update Items</button>
                <button class="secondary" onclick="clearItems()">Clear Items</button>

            <h3>Spin Controls</h3>
                <input type="number" id="spinCount" value="1" min="1">
                <button class="secondary" onclick="handleSpin()">Spin</button>
                

            <div class="toggle">
                <span class="toggle-label active" id="label-left">With Replacement</span>
                
                <button 
                    class="toggle-switch" 
                    id="replacementToggle" 
                    role="switch" 
                    aria-checked="false"
                    onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'false' ? 'true' : 'false');
                            document.getElementById('label-left').classList.toggle('active');
                            document.getElementById('label-right').classList.toggle('active');"
                >
                    <span class="toggle-thumb"></span>
                </button>
                
                <span class="toggle-label" id="label-right">Without Replacement</span>
            </div>

            <div id="results"></div>
            <div class="summary" id="summary"></div>

            <div>
                <button class="secondary" id="clearResultsBtn" onclick="clearResults()">Clear Results</button>
            </div>

        </div>

    </div>

    <script>
        let canvas=document.getElementById("wheel");
        let ctx=canvas.getContext("2d");
        let items=[];
        let results=[];
        let rotation=0;
        let center=260;
        let radius=250;

        function isNoReplace(){
            return document.getElementById("replacementToggle").getAttribute("aria-checked") === "true";
        }

        function updateItems(){
            items=[...new Set(
                document.getElementById("itemsInput").value
                .split("\n")
                .map(i=>i.trim())
                .filter(i=>i)
            )];
            drawWheel();
        }
        function clearItems(){
            items=[];
            document.getElementById("itemsInput").value="";
            drawWheel();
        }
        function clearResults(){
            results=[];
            updateResults();
        }
        function drawWheel(){
            ctx.clearRect(0,0,520,520);
            if(items.length===0) return;
            let angle=2*Math.PI/items.length;
            for(let i=0;i<items.length;i++){
                ctx.beginPath();
                ctx.moveTo(center,center);
                ctx.arc(center,center,radius,i*angle,(i+1)*angle);
                ctx.fillStyle=`hsl(${i*360/items.length},70%,65%)`;
                ctx.fill();

                ctx.save();
                ctx.translate(center,center);
                ctx.rotate(i*angle+angle/2);
                ctx.textAlign="center";
                ctx.textBaseline="middle";
                ctx.fillStyle="#333";
                ctx.font="14px Poppins";
                ctx.fillText(items[i],radius*0.65,0);
                ctx.restore();
            }
        }
        function handleSpin(){
            let count=parseInt(document.getElementById("spinCount").value);
            if(count<=0||items.length===0) return;

            if(count===1){
                spinAnimated();
            }else{
                spinFast(count);
            }
        }
        function spinAnimated(){
            let available=getAvailable();
            if(available.length===0){ alert("No items left"); return; }
            let selected=available[Math.floor(Math.random()*available.length)];
            let index=items.indexOf(selected);
            let angle=2*Math.PI/items.length;
            let target=(Math.PI*2*5)+(items.length-index)*angle;
            rotation+=target;
            canvas.style.transform=`rotate(${rotation}rad)`;
            setTimeout(()=>{
                results.push(selected);
                updateResults();
            },3000);
        }
        function spinFast(count){
            let available=getAvailable();
            if(available.length===0){ alert("No items left"); return; }

            let temp=[];
            for(let i=0;i<count;i++){
                if(available.length===0) break;
                let pick=available[Math.floor(Math.random()*available.length)];
                temp.push(pick);
                if(isNoReplace()){
                    available=available.filter(x=>x!==pick);
                }
            }
            results.push(...temp);
            updateResults();
        }
        function getAvailable(){
            if(isNoReplace()){
                return items.filter(i=>!results.includes(i));
            }
            return items;
        }
        function updateResults(){
            let box=document.getElementById("results");
            let clearBtn=document.getElementById("clearResultsBtn");

            if(results.length===0){
                box.style.display="none";
                box.innerHTML="";
                document.getElementById("summary").innerHTML="";
                clearBtn.style.display="none";
                return;
            }

            clearBtn.style.display="inline-block";
            box.style.display="block";
            box.innerHTML="<b>Results:</b><br>"+results.map((r,i)=>`${i+1}. ${r}`).join("<br>");
            // Auto-scroll to bottom so latest result is always visible
            box.scrollTop=box.scrollHeight;

            let counts={};
            results.forEach(r=>counts[r]=(counts[r]||0)+1);

            let total=results.length;
            let most="-",max=0;
            let summaryHTML="<br><b>Summary</b><br>Total Spins: "+total+"<br>";

            for(let k in counts){
                let percent=((counts[k]/total)*100).toFixed(1);
                summaryHTML+=k+" : "+counts[k]+" ("+percent+"%)<br>";
                if(counts[k]>max){max=counts[k];most=k;}
            }
            summaryHTML+=`Most Frequent: <b style="color:#7b2cbf">${most}</b>`;
            document.getElementById("summary").innerHTML=summaryHTML;
        }

        updateItems();
    </script>
</body>
</html>
